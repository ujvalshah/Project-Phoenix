# ================================================
# Project Nuggets - CI/CD Pipeline
# ================================================
# Triggers on:
#   - Push to main/master/develop branches
#   - Pull requests to main/master
# ================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # QUALITY CHECKS
  # ============================================
  quality:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      CI: true
      NODE_ENV: development
      MONGO_URI: mongodb://127.0.0.1:27017/nuggets_e2e_ci
      JWT_SECRET: ci-playwright-jwt-secret-key-min-32-chars!!
      ENABLE_EMAIL_VERIFICATION: 'false'
      TEST_USER_EMAIL: ci-e2e@example.com
      TEST_USER_PASSWORD: TestPassword123!
      E2E_AUTH_RELAXED_LIMITS: '1'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint (client)
        run: npm run lint:client
        continue-on-error: false

      - name: 🔍 Run ESLint (server)
        run: npm run lint:server

      - name: 📝 Type check (client)
        run: npm run typecheck:client

      - name: 📝 Type check (server)
        run: npm run typecheck:server

      - name: 🎭 Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: 🎭 E2E smoke (perf guards — CI expects 2 passing tests with live API)
        run: npm run test:e2e:smoke

  # ============================================
  # SECURITY SCANNING
  # ============================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔒 Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true  # Report but don't fail build

      - name: 🔍 Run code audit
        run: npm run audit
        continue-on-error: true

  # ============================================
  # BUILD VERIFICATION
  # ============================================
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [quality]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🏗️ Build & verify (bundle size budgets)
        run: npm run build:verify

      - name: 🏗️ Build server (TypeScript -> JS)
        run: npm run build:server

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ============================================
  # TESTS
  # ============================================
  test:
    name: 🧪 Nugget perf & rollout guards
    runs-on: ubuntu-latest
    needs: [quality]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🧪 Vitest (full suite; includes nugget perf-guard tests)
        run: npm run test:ci

  # ============================================
  # DOCKER BUILD (Production deployments)
  # ============================================
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: nuggets:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Uncomment to push to registry (requires secrets)
