    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#334155" stroke-width="1" opacity="0.35" />
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <g transform="translate(120 220)">
    <text x="0" y="0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="110" font-weight="700" fill="#f8fafc">
      Nuggets
    </text>
    <text x="2" y="66" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="36" font-weight="500" fill="#cbd5e1">
